<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ค้นหาเพื่อน — Skintania</title>
  <style>body { display: none; }</style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="/global.css">
  <link rel="stylesheet" href="/Template/style.css">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="/Assest/sk-cu.png">
  <script type="module" src="/Template/component.js"></script>
</head>

<body>
  <div class="wrap" style="margin-bottom:0; padding-bottom:0">
    <site-header page-title="ค้นหาเพื่อน" page-desc="ค้นหาสมาชิก Skintania"></site-header>
  </div>

  <!-- Search view -->
  <div id="searchView" class="wrap" style="display:none">
    <div class="pf-page-header">
      <h2><i class="fa-solid fa-users"></i> ค้นหาสมาชิก</h2>
      <p class="lead">ค้นหาด้วยชื่อ, username หรือรหัสนิสิต</p>
    </div>

    <div class="pf-search-box">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" id="searchInput" placeholder="พิมพ์เพื่อค้นหา…" autocomplete="off">
      <span class="pf-search-clear" id="searchClear" style="display:none">
        <i class="fa-solid fa-xmark"></i>
      </span>
    </div>

    <div id="searchResults"></div>
  </div>

  <!-- Profile view -->
  <div id="profileView" class="wrap" style="display:none">
    <a class="pf-back-btn" href="/profile/">
      <i class="fa-solid fa-arrow-left"></i> ค้นหาสมาชิก
    </a>

    <div id="profileState" class="pf-state">
      <i class="fa-solid fa-spinner fa-spin"></i>
      <p>กำลังโหลด...</p>
    </div>

    <div id="profileCard" class="pf-card" style="display:none">

      <div class="pf-avatar-wrap">
        <div class="pf-avatar-icon" id="profileAvatarIcon"><i class="fa-solid fa-user"></i></div>
        <img class="pf-avatar-img" id="profileAvatarImg" alt="" style="display:none">
      </div>

      <div class="pf-identity">
        <h1 class="pf-name" id="profileName">—</h1>
        <span class="pf-username" id="profileUsername">@—</span>
        <div class="pf-badges" id="profileBadges"></div>
      </div>

      <div class="pf-info-grid" id="profileInfoGrid"></div>

      <div class="pf-admin-zone" id="adminZone" style="display:none">
        <div class="pf-admin-label">
          <i class="fa-solid fa-shield-halved"></i> Admin Actions
        </div>
        <div class="pf-admin-row">
          <button class="pf-btn-ban" id="banBtn">
            <i class="fa-solid fa-ban"></i>
            <span id="banLabel">Ban User</span>
          </button>
          <div class="pf-role-group">
            <select id="roleSelect" class="pf-role-select">
              <option value="member">Member</option>
              <option value="OSK">OSK</option>
              <option value="admin">Admin</option>
            </select>
            <button class="btn pf-btn-apply" id="applyRoleBtn">
              <i class="fa-solid fa-check"></i> Apply
            </button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script type="module" src="profile.js"></script>
</body>

</html>
