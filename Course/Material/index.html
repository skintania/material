<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intania-Material</title>

  <link rel="stylesheet" href="style.css">

  <link rel="stylesheet" href="/Template/style.css">
  <script type="module" src="/auth-guard.js"></script>
  <script type="module" src="/Template/component.js" defer></script>
  <link rel="icon" href="/Assest/sk-cu.png">

  <style>
    /* 1. CSS จัดหน้าตา Image Popup */
    .popup-overlay {
      display: flex;
      justify-content: center;
      align-items: center;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.8);
      z-index: 9999;
      opacity: 1;
      transition: opacity 0.3s ease;
    }

    .popup-content {
      position: relative;
      background-color: transparent;
      padding: 0;
      max-width: 90%;
      max-height: 90%;
    }

    .popup-content img {
      max-width: 100%;
      max-height: 85vh;
      display: block;
      border-radius: 8px;
      border: 2px solid white;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
    }

    /* ปุ่มปิด (กากบาท) */
    .close-btn {
      position: absolute;
      top: -15px;
      right: -15px;
      width: 35px;
      height: 35px;
      background-color: #ff0000;
      color: white;
      font-size: 24px;
      font-weight: bold;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid white;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
      z-index: 10000;
    }

    .close-btn:hover {
      background-color: #cc0000;
    }

    .hidden {
      display: none !important;
    }

    /* 2. CSS สำหรับ Sticky Popup (โลโก้ลอย) */
    .sticky-popup {
      position: fixed;
      top: 10px;
      left: 10px;
      width: 250px;
      background-color: transparent;
      z-index: 10000;
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.5));
    }

    .sticky-popup img {
      width: 50%;
      height: auto;
      display: block;
      border-radius: 8px;
      opacity: 0.5;
      border: none;
    }

    @media (max-width: 768px) {
      .sticky-popup {
        width: 150px;
        top: 10px;
        left: 10px;
      }
    }
  </style>
</head>

<body>

  <comment-widget></comment-widget>

  <div class="sticky-popup">
    <img src="/Assest/sk-cu.png" alt="เว็บนี้จัดทำโดยกุหลาบราชัน">
  </div>

  <div class="container">
    <div class="player" id="playerWrap">
      <video id="videoPlayer" playsinline webkit-playsinline></video>

      <div class="dbl-tap left" id="dblLeft">
        <div class="dbl-tap-text"><span>◀◀</span><span>10 วินาที</span></div>
      </div>
      <div class="dbl-tap right" id="dblRight">
        <div class="dbl-tap-text"><span>▶▶</span><span>10 วินาที</span></div>
      </div>

      <div class="video-controls" id="videoControls">
        <div class="seek-wrap" id="seekWrap">
          <div class="seek-preview" id="seekPreview">
            <video id="previewVideo" preload="metadata" muted playsinline></video>
            <span id="previewTime"></span>
          </div>
          <input type="range" id="seekBar" min="0" max="100" value="0" step="0.1">
        </div>
        <div class="controls-row">
          <div class="controls-left">

            <button class="ctrl-btn" id="playBtn" title="Play / Pause">
              <svg id="playIcon" viewBox="0 0 24 24" width="20" height="20" fill="white"><polygon points="5,3 19,12 5,21"/></svg>
              <svg id="pauseIcon" viewBox="0 0 24 24" width="20" height="20" fill="white" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
            </button>

            <button class="ctrl-btn" id="skipBackBtn" title="ย้อนกลับ 10 วินาที">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="white">
                <path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
                <text x="12" y="15.5" text-anchor="middle" font-size="5.5" font-family="sans-serif" font-weight="bold" fill="white">10</text>
              </svg>
            </button>
            <button class="ctrl-btn" id="skipFwdBtn" title="ข้ามไป 10 วินาที">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="white">
                <path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/>
                <text x="12" y="15.5" text-anchor="middle" font-size="5.5" font-family="sans-serif" font-weight="bold" fill="white">10</text>
              </svg>
            </button>

            <div class="volume-wrap">
              <button class="ctrl-btn" id="muteBtn" title="Mute">
                <svg id="volOnIcon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                <svg id="volOffIcon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" style="display:none"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
              </button>
              <input type="range" id="volumeBar" min="0" max="1" step="0.05" value="1">
            </div>

            <span class="time-display" id="timeDisplay">0:00 / 0:00</span>
          </div>

          <div class="controls-right">
            <div class="speed-wrap">
              <button class="ctrl-btn speed-toggle-btn" id="speedToggle" title="Playback speed">1×</button>
              <div class="speed-menu" id="speedMenu">
                <button class="speed-opt" data-speed="0.5">0.5×</button>
                <button class="speed-opt" data-speed="0.75">0.75×</button>
                <button class="speed-opt active" data-speed="1">1×</button>
                <button class="speed-opt" data-speed="1.25">1.25×</button>
                <button class="speed-opt" data-speed="1.5">1.5×</button>
                <button class="speed-opt" data-speed="2">2×</button>
              </div>
            </div>

            <button class="ctrl-btn" id="fullscreenBtn" title="Fullscreen">
              <svg id="fsEnterIcon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
              <svg id="fsExitIcon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" style="display:none"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
    <div class="catalog" id="catalog"></div>
  </div>

  <script type="module" src="player.js"></script>

</body>

</html>
